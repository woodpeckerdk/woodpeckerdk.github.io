<!DOCTYPE html>
<html>
<head>
  <title>My Personal Blog</title>
  <link rel="stylesheet" type="text/css" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <style>
    /* Add your custom styles here */
    body {
      font-family: Arial, sans-serif;
    }
    header {
      background-color: #f8f9fa;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #007bff;
    }
    .blog-post {
      margin-bottom: 40px;
    }
    .blog-post h2 {
      color: #343a40;
    }
  </style>
</head>
<body>
  <header>
    <h1>This is My Personal Blog</h1>
  </header>
  <div class="container">
    <div class="row">
      <div class="col-md-8">
        <div class="blog-post">
          <h2>Welcome to My Blog</h2>
          <p>This is my first blog post. Stay tuned for more content!</p>
        </div>
      </div>
      <div class="col-md-4">
        <h3>About Me</h3>
        <p>Welcome to my personal blog. I will be sharing my thoughts and experiences here. Check back often for updates!</p>
      </div>
    </div>
  </div>
</body>
</html>
